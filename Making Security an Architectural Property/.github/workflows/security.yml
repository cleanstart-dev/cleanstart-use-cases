# ============================================================================
# .github/workflows/security.yml
# This pipeline IS the architecture. A non-compliant Dockerfile cannot reach
# main because this workflow fails the PR. Security is no longer "did you
# remember?" — it's "the build won't merge if you didn't."
# ============================================================================

name: security-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  policy-check:
    name: CIS Policy (Conftest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.56.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin

      - name: Verify hardened Dockerfile passes CIS policy
        run: conftest test --policy policies/ Dockerfile.hardened

      - name: Confirm baseline Dockerfile FAILS CIS policy (sanity check)
        run: |
          if conftest test --policy policies/ Dockerfile.baseline; then
            echo "::error::The baseline Dockerfile should have failed but passed. Policy is broken."
            exit 1
          else
            echo "Baseline correctly rejected by policy. Architecture working as designed."
          fi

  lint:
    name: Hadolint (Dockerfile linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint hardened Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.hardened
          failure-threshold: warning

  vuln-scan:
    name: Trivy (CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build hardened image
        run: docker build -t nginx-hardened:ci -f Dockerfile.hardened .

      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: nginx-hardened:ci
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: vuln-scan
    steps:
      - uses: actions/checkout@v4
      - name: Build hardened image
        run: docker build -t nginx-hardened:ci -f Dockerfile.hardened .
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: nginx-hardened:ci
          format: spdx-json
          artifact-name: sbom.spdx.json