# ─────────────────────────────────────────────────────────────────
# Default-deny network policy.
# Blocks all ingress and egress in the namespace unless explicitly
# allowed by another policy.
#
# Maps to: NIST 800-53 SC-7 (boundary protection)
#
# NOTE: kind clusters use kindnet CNI by default, which does NOT
# enforce NetworkPolicy. For real enforcement, install Calico,
# Cilium, or another policy-capable CNI.
# ─────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: stig-hardened
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
