name: Attack Surface Comparison

# Runs cleanstart/node:latest against node:20-bullseye side by side.
# The Actions tab tells the story: one green, one red.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'   # weekly — catches drift automatically
  workflow_dispatch:

jobs:

  bloated-base:
    name: "node:20-bullseye"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull image
        run: docker pull node:20-bullseye

      - name: Age + CVE check
        run: |
          chmod +x check_drift.sh
          ./check_drift.sh node:20-bullseye 30 || true
          # Expected: drifted + many CVEs — this is the golden image problem

      - name: Full CVE report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: node:20-bullseye
          severity: CRITICAL,HIGH
          format: table
          exit-code: '0'   # don't block — this is the "before" side of the demo

  cleanstart:
    name: "cleanstart/node:latest — minimal base"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull image
        run: docker pull cleanstart/node:latest

      - name: Age + CVE check
        run: |
          chmod +x check_drift.sh
          ./check_drift.sh cleanstart/node:latest 30
          # Expected: PASS — minimal image = minimal attack surface

      - name: Full CVE report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cleanstart/node:latest
          severity: CRITICAL,HIGH
          format: table
          exit-code: '1'   # fail the build if CRITICAL CVEs slip in
